services:
  - type: web
    name: webhawk-pro
    runtime: node
    plan: free
    region: singapore
    branch: main
    autoDeploy: true

    # --include=dev ensures vite (devDep) is installed even with NODE_ENV=production
    # postinstall in package.json handles backend deps automatically
    buildCommand: npm install --include=dev --no-audit --no-fund && npm run build
    startCommand: node backend/server.js

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
